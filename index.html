<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>BBU Generator</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">
  <div class="max-w-2xl mx-auto p-8">
    <h1 class="text-3xl font-bold mb-6">BBU Generator Gratis</h1>

    <input
      id="productName"
      class="w-full border p-3 rounded mb-4"
      placeholder="Nama Produk: Contoh Skintific"
    />
    
    <textarea
      id="targetMarket"
      class="w-full border p-3 rounded mb-4"
      placeholder="Target Market: Contoh Cewek 20-30 tahun yang mau kulit glowing"
      rows="3"
    ></textarea>

    <button
      onclick="generate()"
      id="btn"
      class="bg-blue-600 text-white px-6 py-3 rounded font-semibold"
    >
      Generate Ide Konten
    </button>

    <div id="loading" class="hidden mt-4">Lagi mikir...</div>
    <pre id="result" class="mt-4 p-4 bg-white border rounded whitespace-pre-wrap"></pre>
  </div>

  <script>
    async function generate() {
      const productName = document.getElementById('productName').value;
      const targetMarket = document.getElementById('targetMarket').value;
      const btn = document.getElementById('btn');
      const loading = document.getElementById('loading');
      const result = document.getElementById('result');

      if(!productName) return alert('Isi nama produk dulu');
      if(!targetMarket) return alert('Isi target market dulu');

      btn.disabled = true;
      loading.classList.remove('hidden');
      result.textContent = '';

      try {
        const res = await fetch('/api/generate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            prompt: `Buatkan 5 ide konten TikTok viral untuk produk "${productName}" dengan target market "${targetMarket}". 
            
            Format untuk setiap ide:
            IDE KONTEN: [judul]
            HOOK: [3 detik pertama yang bikin nonton]
            SCRIPT: [isi konten 15-30 detik]
            CAPTION: [caption + CTA]
            HASHTAG: [5 hashtag relevan]
            
            Bikin yang relate sama target market & berpotensi FYP`
          })
        });

        const data = await res.json();
        result.textContent = data.text || 'Gagal generate';

      } catch (err) {
        result.textContent = 'Error: ' + err.message;
      }

      btn.disabled = false;
      loading.classList.add('hidden');
    }
  </script>
</body>
</html>
